# run_full_study_v1.yaml
# Run profile for the full manuscript analysis
# Version: 1.0
# Author: Mihye Kwon
run:
  run_profile_name: full_study_v1
  protocol_version: v1.0
  purpose: full_manuscript_analysis
execution_scope:
  use_primary_eqtl_layer: true
  use_secondary_pqtl_layer: true
  run_colocalisation: true
  colocalisation_mode: priority_targets_multi_outcome
  run_failure_mode_diagnostic: true
  run_fail_mode_api_fetch: false
  failmode_tiers:
    tier1_statistical: true
    tier2_locus_complexity: true
    tier3_mechanism_mismatch: true
    tier4_alt_regulatory: true
  failmode_api:
    cache_enabled: true
    cache_dir: cache/failmode_api/
    rate_limit_ms: 200
targets:
  use_all_prespecified_targets: true
thresholds:
  use_primary_p_threshold_only: true
  run_threshold_sensitivity_today: true
outcomes_to_run:
  primary: true
  replication: true
  secondary:
    seropos: true
    seroneg: true
    eas: true
mr_methods:
  apply_rule_based_method_selection_from_protocol: true
  preferred_method_order:
  - Inverse variance weighted
  - Wald ratio
  - Weighted median
  - MR Egger
sensitivity_to_run:
  heterogeneity: true
  pleiotropy: true
  leave_one_out: true
  estimator_sensitivity: true
  threshold_sensitivity: true
  report_i2_gx_with_egger: true
colocalisation_run:
  enabled: true
  targets:
  - tnf
  - lta
  - fcgr1a
  - fcgr2a
  - fcgr2b
  - fcgr2c
  - fcgr3a
  - fcgr3b
  - cd80
  - cd86
  - ctla4
  - ms4a1
  - il6r
  - il1r1
  - jak1
  - jak2
  - jak3
  - tyk2
  coloc_outcomes: 
    core:
    - RA_EUR_PRIMARY
    supplementary:
    - RA_EUR_REP1_FinnGen
  method_default: coloc_abf
  allow_extended_method_today: true
  extended_method_mode: triggered_follow_up_only
  require_ld_for_susie: true
  ld_backend_for_susie: local_plink_only
pqtl_run:
  enabled: true
  source_manifest: configs/pqtl_sources.yaml
  strict_source_manifest: false
  run_replication_outcomes: true
classification:
  primary_p_threshold: 0.05
required_outputs_full_study:
- instrument_attrition_table
- non_estimable_table
- main_mr_results
- preferred_mr_results
- heterogeneity_results
- pleiotropy_results
- leaveoneout_results
- serostatus_heterogeneity_table
- ancestry_transportability_table
- benchmark_classification_table
- benchmark_classification_with_support_layers
- priority_target_colocalisation_summary
- sample_overlap_assessment
- sample_overlap_summary
- sample_overlap_bias_bound_worst_case
- sample_overlap_bias_bound_50pct
- pqtl_source_summary
- pqtl_instrument_attrition_table
- pqtl_main_mr_results
- pqtl_preferred_mr_results
- pqtl_heterogeneity_results
- pqtl_pleiotropy_results
- pqtl_leaveoneout_results
- pqtl_non_estimable_table
- pqtl_support_summary
- cross_proxy_consistency_table
- master_benchmark_table
- egger_i2gx_results
- susie_followup_summary
- susie_trigger_log
- pqtl_egger_i2gx_results
- replication_coloc_summary
- coloc_cross_outcome_concordance
- fail_diagnostic_composite
- tier1_statistical_detail
- tier2_locus_complexity
- tier3_mechanism_mismatch
- tier4_alt_regulatory_layer
- fail_mode_annotation_log
required_outputs_today:
- instrument_attrition_table
- non_estimable_table
- main_mr_results
- preferred_mr_results
- heterogeneity_results
- pleiotropy_results
- leaveoneout_results
- serostatus_heterogeneity_table
- ancestry_transportability_table
- benchmark_classification_table
